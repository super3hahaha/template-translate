name: Auto Release

# 每次 push 到 main 自动打一个 release：取最新 release 的版本号、patch +1，
# 用当前 commit 建 tag + release（notes 自动按上个 tag 以来的提交生成）。
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version & create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          latest=$(gh release list -L 1 --json tagName -q '.[0].tagName' || true)
          if [ -z "${latest:-}" ]; then
            next="v0.0.1"
          else
            ver=${latest#v}
            IFS='.' read -r major minor patch <<< "$ver"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "latest=$latest  next=$next"
          gh release create "$next" \
            --title "$next" \
            --target "$GITHUB_SHA" \
            --generate-notes
